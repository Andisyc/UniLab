# @package _global_
training:
  task_name: G1WalkFlat
  sim_backend: mujoco
algo:
  num_envs: 2048
  learning_starts: 10
  max_iterations: 5000
  save_interval: 1000
  updates_per_step: 8
  use_symmetry: true
  algo_params:
    alpha_init: 0.001
    target_entropy_ratio: 0.0
env:
  control_config:
    action_scale: 1.0
  commands:
    vel_limit:
      - [-0.3, -0.2, -0.4]
      - [0.8, 0.2, 0.4]
    rel_standing_envs: 0.4
    small_xy_threshold: 0.0
  gait_phase_init_mode: "offset_phase"
  reset_base_qvel_limit: 0.5
  stand_action_authority: false
  curriculum:
    enabled: true
    initial_scale: 0.5
    min_scale: 0.5
    max_scale: 1.0
    level_down_threshold: 150.0
    level_up_threshold: 750.0
    degree: 0.001
  noise_config:
    level: 1.0
    scale_gyro: 0.0
    scale_gravity: 0.0
    scale_joint_angle: 0.01
    scale_joint_vel: 0.1
    scale_linvel: 0.0
reward:
  scales:
    tracking_lin_vel: 2.0
    tracking_ang_vel: 1.5
    under_speed: -0.5
    penalty_ang_vel_xy: -1.0
    penalty_orientation: -10.0
    penalty_action_rate: -4.0
    stand_still: -2.0
    stand_action_l2: -2.0
    stand_dof_vel_l2: -0.15
    stand_lin_vel_xy_l2: -30.0
    stand_yaw_vel_l2: -10.0
    pose: -0.5
    penalty_feet_ori: -20.0
    feet_phase: 0.0
    feet_phase_contrast: 0.0
    feet_phase_contact: 0.0
    alive: 2.0
  tracking_sigma: 0.12
  base_height_target: 0.754
  min_base_height: 0.3
  max_tilt_deg: 65.0
  gait_frequency: 1.5
  feet_phase_swing_height: 0.09
  feet_phase_tracking_sigma: 0.04
  close_feet_threshold: 0.15
  mode:
    enabled: true
    stand_terms:
      - penalty_orientation
      - penalty_ang_vel_xy
      - stand_still
      - stand_action_l2
      - stand_dof_vel_l2
      - stand_lin_vel_xy_l2
      - stand_yaw_vel_l2
      - pose
      - penalty_feet_ori
      - alive
    walk_terms:
      - tracking_lin_vel
      - tracking_ang_vel
      - under_speed
      - penalty_orientation
      - penalty_ang_vel_xy
      - penalty_action_rate
      - pose
      - penalty_feet_ori
      - alive
  gait_constraint:
    enabled: true
    command_xy_threshold: 0.05
    command_yaw_threshold: 0.05
    height_weight: 1.0
    contrast_weight: 2.0
    contact_weight: 1.0
    epsilon: 0.0
    penalty_scale: 2.0
    apply_in_stand_mode: true
    apply_when_tracking: false
    freeze_phase_in_stand_mode: true
    stand_phase: [3.141592653589793, 3.141592653589793]
  pose_weights: [0.01, 1.0, 0.05, 0.01, 5.0, 5.0, 0.01, 1.0, 0.05, 0.01, 5.0, 5.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0]
